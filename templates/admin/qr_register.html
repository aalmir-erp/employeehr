{% extends "base.html" %}

{% block title %}Add New User{% endblock %}

{% block content %}
<div class="col-md-8 mx-auto">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-person-plus me-2"></i>
                Add New User
            </h5>
        </div>
        <div class="card-body">
<h2>Create Your Account</h2>

            <style>
                .form-control:disabled {
    background-color: #ccced3;
    opacity: 1;
}

            </style>
<form method="post">
                    <div class="mb-3">
    <label class="form-label">Name</label>
    <input class="form-control" type="text" value="{{ employee.name }}" readonly >
                    </div>
                <div class="mb-3">
    <label class="form-label">Employee ID</label>
    <input class="form-control" type="text" name="id" value="{{ employee.id or '' }}" readonly>
                    </div>
                <div class="mb-3">
    <label class="form-label">Username</label>
    <input class="form-control" type="text" name="employee_code" value="{{ employee.employee_code or '' }}" readonly>
                    </div>
                <div class="mb-3">
    <label class="form-label">Email *</label>
    <input class="form-control" type="email" name="email" value="{{ employee.email or '' }}" required>
                    </div>
                <div class="mb-3">
    <label class="form-label">Phone *</label>
    <input class="form-control" type="text" name="phone" value="{{ employee.phone or '' }}" required>
                    </div>

                <div class="mb-3">
    <label class="form-label">Password *(note this password for next time login</label>
    <input class="form-control" type="text" name="password" value="{{password_str}}" readonly required>
                    </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-person-plus"></i> Create Account
                    </button>
<!--    <button type="submit">Create Account</button>-->
                    </div>
</form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        // Password confirmation validation
        $('form').submit(function(e) {
            var password = $('#password').val();
            var confirmPassword = $('#confirm_password').val();

            if(password.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters long');
                return;
            }

            if(password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match');
                return;
            }
        });
    });
</script>
{% endblock %}
