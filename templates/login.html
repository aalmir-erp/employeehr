{% extends "base.html" %}

{% block title %}Login - MIR AMS{% endblock %}

{% block content %}
<div class="col-md-6 offset-md-3 col-lg-4 offset-lg-4">
    <div class="card mt-5">
        <div class="card-header text-center">
            <h4><i class="bi bi-box-arrow-in-right"></i> Login</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('auth.login') }}">
                {{ form.hidden_tag() if form }}
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="number" pattern="[0-9]+" class="form-control" id="username" name="username" required autofocus
                               data-bs-toggle="tooltip" title="Enter your ERP Number">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password" required
                               data-bs-toggle="tooltip" title="Enter your password">
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>

                <!-- Buttons -->
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary" 
                            >
                        <i class="bi bi-box-arrow-in-right"></i> Login with Password
                    </button>
                    <a href="{{ url_for('auth.whatsapp_login') }}" class="btn btn-success"
                       >
                        <i class="bi bi-whatsapp"></i> Login with WhatsApp
                    </a>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="card-footer text-center">
            <p class="mb-0">
                <small>First time setup? <a href="{{ url_for('auth.setup') }}">Create Admin Account</a></small>
            </p>
        </div>
    </div>
</div>

<!-- Initialize Bootstrap Tooltips -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
});
</script>
{% endblock %}
